<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídia Indoor - Pastel do Chiquinho</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .viewport {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ffcc00 0%, #d62976 45%, #4f5bd5 100%);
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        /* Header Ajustado */
        .insta-header {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin-bottom: 2vh;
            gap: 15px;
        }

        .insta-header .logo-icon {
            height: 40px; 
            filter: brightness(0) invert(1);
        }

        .insta-header .logo-text { 
            height: 45px; 
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Card Responsivo */
        .post-card {
            width: 100%;
            max-width: 1200px; /* Limite para telas ultra-wide */
            height: auto;
            max-height: 85vh;
            background: #fff;
            border-radius: 12px; 
            display: flex;
            flex-direction: row; /* Padrão Horizontal */
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            animation: slideIn 0.5s ease-out;
        }

        /* Ajuste para telas Verticais (Portrait) */
        @media (orientation: portrait) {
            .post-card {
                flex-direction: column;
                max-width: 90vw;
                height: auto;
            }
            .post-media-container {
                aspect-ratio: 1 / 1; /* Mantém quadrado no mobile */
                width: 100%;
            }
            .caption-area p { font-size: 2vh !important; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .post-media-container {
            flex: 1.2;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .post-media-container img, 
        .post-media-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-content {
            flex: 1;
            padding: 25px;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            position: relative;
            min-height: 200px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .user-info .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
        }

        .user-info .avatar img {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        .user-details .username { 
            font-weight: 700; 
            font-size: 1.2rem; 
            color: #262626; 
        }
        
        .user-details .location { 
            font-size: 0.9rem; 
            color: #8e8e8e; 
        }

        .caption-area {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .caption-area p { 
            font-size: 1.3rem;
            line-height: 1.4; 
            color: #262626; 
            text-align: left;
        }

        .text-overflow-fade {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 40px;
            background: linear-gradient(transparent, white 90%);
        }

        #loading { 
            position: fixed;
            color: white; font-size: 1.5rem; font-weight: bold;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

<div class="viewport" id="viewport">
    <div id="loading">SINCRONIZANDO CONTEÚDO...</div>
</div>

<script>
const feedUrl = "https://rss.app/feeds/gEYrYZwwdvNWd2YG.xml";
const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;

const backupMedia = [
    { type: 'image', url: 'https://bertioga.tudoem.com.br/img/site/cropped_170401_2021080469565.jpeg', caption: "O melhor pastel da região! 🔥" },
    { type: 'image', url: 'https://i.imgur.com/nuVZoGP.jpeg', caption: "Qualidade e sabor inigualável em Bertioga." },
    { type: 'video', url: 'https://i.imgur.com/5XQ0dzr.mp4', caption: "Deu água na boca? Venha conferir! 🥟" },
    { type: 'video', url: 'https://i.imgur.com/exciGvm.mp4', caption: "Pastel quentinho saindo agora!" }
];

let mainPlaylist = [];
let currentIndex = 0;

function stripHtml(html) {
    if (!html) return "";
    const div = document.createElement('div');
    div.innerHTML = html;
    return (div.textContent || div.innerText || "").trim().replace(/\s\s+/g, ' ');
}

function extrairImg(item) {
    if (item.thumbnail && !item.thumbnail.includes(".mp4")) return item.thumbnail;
    if (item.enclosure && item.enclosure.link && !item.enclosure.link.includes(".mp4")) return item.enclosure.link;
    const div = document.createElement('div');
    div.innerHTML = item.description;
    const img = div.querySelector('img');
    return img ? img.src : "";
}

async function montarPlaylist() {
    try {
        const response = await fetch(apiUrl);
        const data = await response.json();
        
        let temporaryList = [];

        if (data.status === 'ok' && data.items.length > 0) {
            data.items.forEach(item => {
                const img = extrairImg(item);
                if (img) {
                    temporaryList.push({
                        type: 'image',
                        url: img,
                        caption: stripHtml(item.description) || "Confira nossas novidades!"
                    });
                }
            });
        }

        backupMedia.forEach(b => temporaryList.push(b));

        for (let i = temporaryList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [temporaryList[i], temporaryList[j]] = [temporaryList[j], temporaryList[i]];
        }

        mainPlaylist = temporaryList;
        currentIndex = 0;
    } catch (e) {
        mainPlaylist = [...backupMedia];
    }
}

function exibirProximo() {
    if (mainPlaylist.length === 0) return;

    if (currentIndex >= mainPlaylist.length) {
        montarPlaylist().then(() => exibirProximo());
        return;
    }

    const item = mainPlaylist[currentIndex];
    
    let mediaHtml = item.type === 'video' 
        ? `<video src="${item.url}" autoplay loop muted playsinline></video>`
        : `<img src="${item.url}" onerror="this.src='${backupMedia[0].url}'">`;

    renderizar(mediaHtml, item.caption);
    currentIndex++;
}

function renderizar(mediaHtml, caption) {
    const container = document.getElementById('viewport');
    container.innerHTML = `
        <div class="insta-header">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" class="logo-icon" alt="Ícone">
            <img src="https://www.pngkey.com/png/full/28-287308_instagram-logo-text-white.png" class="logo-text" alt="Instagram">
        </div>
        <div class="post-card">
            <div class="post-media-container">${mediaHtml}</div>
            <div class="post-content">
                <div class="user-info">
                    <div class="avatar">
                        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png">
                    </div>
                    <div class="user-details">
                        <div class="username">pasteldochiquinho24hs</div>
                        <div class="location">Instagram • Bertioga</div>
                    </div>
                </div>
                <div class="caption-area">
                    <p><strong>pasteldochiquinho24hs</strong> ${caption}</p>
                    <div class="text-overflow-fade"></div>
                </div>
            </div>
        </div>
    `;
}

(async function init() {
    await montarPlaylist();
    exibirProximo();
    setInterval(exibirProximo, 30000);
})();
</script>

</body>
</html>
